<header class="topbar">
  <div class="topbar__inner">
    <a class="topbar__logo" routerLink="/" aria-label="Home">
      <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor" aria-hidden="true">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
    </a>

    <div class="topbar__search gh-search-box">
      <svg class="gh-search-box__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
        <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
      </svg>
      <input
        class="gh-search-box__input"
        [formControl]="state.queryControl"
        (keydown)="state.onEnter($event)"
        placeholder="Search repositories..."
        autocomplete="off"
        spellcheck="false"
        type="search"
        aria-label="Search repositories"
      />
      <button
        class="gh-search-box__btn"
        type="button"
        (click)="state.search()"
        [disabled]="(state.isSearchDisabled$ | async) || (state.isLoading$ | async)"
        aria-label="Search repositories"
      >
        @if (state.isLoading$ | async) {
          <span class="gh-search-box__spinner" role="status" aria-label="Loading"></span>
        } @else {
          Search
        }
      </button>
    </div>

    <div class="topbar__filters" role="group" aria-label="Sort and order filters">
      <label class="gh-filter__label" for="sort-select">Sort by</label>
      <select id="sort-select" class="gh-filter__select" [formControl]="state.sortControl" aria-label="Sort by">
        <option value="stars">Stars</option>
        <option value="forks">Forks</option>
        <option value="help-wanted-issues">Help wanted</option>
        <option value="updated">Updated</option>
      </select>
      <label class="gh-filter__label" for="order-select">Order</label>
      <select id="order-select" class="gh-filter__select" [formControl]="state.orderControl" aria-label="Order by">
        <option value="desc">Descending</option>
        <option value="asc">Ascending</option>
      </select>
    </div>
  </div>
</header>
